<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume – ClosedBridge LLC</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .resume-container {
            max-width: 960px;
            margin: 2.5rem auto;
            padding: 0 2rem;
        }

        .resume-toolbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 0.75rem;
        }

        .resume-toolbar a {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #3D342A;
            text-decoration: none;
            border: 1px solid #3D342A;
            padding: 0.4rem 1rem;
            transition: background-color 0.2s, color 0.2s;
        }

        .resume-toolbar a:hover {
            background-color: #3D342A;
            color: #F4EFE6;
        }

        .resume-embed {
            width: 100%;
            height: 85vh;
            border: 1px solid #D8CFBF;
        }
    </style>
</head>
<body>

    <div data-component="header"></div>
    <div data-component="nav"></div>

    <div class="resume-container">
        <div class="resume-toolbar">
            <a href="Resume/full-resume-closedbridge.pdf" download>Download PDF</a>
        </div>
        <iframe src="Resume/full-resume-closedbridge.html" width="600" height="400" title="My Resume" class="resume-embed">
            Your browser does not support iframes.
        </iframe>

    </div>

    <div data-component="footer"></div>

    <script src="components/load-components.js"></script>
</body>
</html>
