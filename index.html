<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClosedBridge LLC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div data-component="header"></div>

    <div class="sim-controls">
        <button id="mode-toggle">Mode: Autonomous</button>
        <button id="reset-sim">Reset</button>
        <span id="controller-status"></span>
        <span class="sim-hint" id="sim-hint">Tap or use ← → to push the cart</span>
    </div>

    <div data-component="nav"></div>

    <main>
        <div class="intro">
            <p>Hi, I'm Alex and this is my site for my company ClosedBridge!</p>
            <p>We specialize in embedded systems and controls engineering for various industries, with a focus on robotics.</p>
            <p>Feel free to reach out to schedule a consultation or discuss potential projects.</p>
        </div>
    </main>

    <div data-component="footer"></div>

    <script src="components/load-components.js"></script>
    <script src="./node_modules/matter-js/build/matter.js"></script>
    <script>
        window.componentsReady.then(function () {
            const { Engine, Render, Runner, Bodies, Body, Composite, Constraint, Events } = Matter;

            // Create canvas and insert into header slot
            const slot = document.getElementById('header-sim-slot');
            if (!slot) return;
            const canvas = document.createElement('canvas');
            slot.appendChild(canvas);

            // Sized to fit header — wide, matching logo height
            const W = 600, H = 120;
            canvas.width = W;
            canvas.height = H;

            const engine = Engine.create({ gravity: { y: 1 } });
            const world = engine.world;

            Render.run(Render.create({
                canvas: canvas,
                engine: engine,
                options: { width: W, height: H, wireframes: false, background: '#F4EFE6' }
            }));
            Runner.run(Runner.create(), engine);

            // Ground and rail
            const railY = H - 18;
            Composite.add(world, [
                Bodies.rectangle(W / 2, H - 4, W, 8, { isStatic: true, render: { fillStyle: '#3D342A' } }),
                Bodies.rectangle(W / 2, railY, W, 3, { isStatic: true, render: { fillStyle: '#5C4F42' } })
            ]);

            // Cart
            const cartW = 40, cartH = 10;
            const cartX = W / 2, cartY = railY - cartH / 2;
            const cart = Bodies.rectangle(cartX, cartY, cartW, cartH, {
                frictionAir: 0.05,
                friction: 0,
                collisionFilter: { group: -1 },
                render: { fillStyle: '#3D342A' }
            });
            Body.setInertia(cart, Infinity);

            // Pole
            const poleLen = 60, poleW = 4;
            const pole = Bodies.rectangle(cartX, cartY - cartH / 2 - poleLen / 2, poleW, poleLen, {
                frictionAir: 0.006,
                collisionFilter: { mask: 0 },
                render: { fillStyle: '#8B5E3C' }
            });
            Body.setAngle(pole, 0.1);

            // Pin joint
            const pivot = Constraint.create({
                bodyA: cart, pointA: { x: 0, y: -cartH / 2 },
                bodyB: pole, pointB: { x: 0, y: poleLen / 2 },
                stiffness: 1, length: 0,
                render: { visible: false }
            });

            Composite.add(world, [cart, pole, pivot]);

            // Keyboard control
            const keys = {};
            document.addEventListener('keydown', e => { keys[e.key] = true; });
            document.addEventListener('keyup',   e => { keys[e.key] = false; });

            // Touch control
            let touchDir = 0;
            canvas.addEventListener('touchstart', e => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const x = e.touches[0].clientX - rect.left;
                touchDir = x < rect.width / 2 ? -1 : 1;
            }, { passive: false });
            canvas.addEventListener('touchend', e => {
                e.preventDefault();
                touchDir = 0;
            }, { passive: false });
            canvas.addEventListener('touchcancel', () => { touchDir = 0; });

            // Controller state
            let autoMode = true;
            let controllerState = 'swingup';

            // PID state
            let pidIntegral = 0;
            let pidLastError = 0;

            const toggleBtn = document.getElementById('mode-toggle');
            const statusEl = document.getElementById('controller-status');
            const hintEl = document.getElementById('sim-hint');

            function resetSim() {
                Body.setPosition(cart, { x: cartX, y: cartY });
                Body.setVelocity(cart, { x: 0, y: 0 });
                Body.setAngle(pole, 0.1);
                Body.setAngularVelocity(pole, 0);
                Body.setPosition(pole, { x: cartX, y: cartY - cartH / 2 - poleLen / 2 });
                Body.setVelocity(pole, { x: 0, y: 0 });
                controllerState = 'swingup';
                pidIntegral = 0;
                pidLastError = 0;
                if (autoMode) statusEl.textContent = '[ Swing-Up ]';
            }

            document.getElementById('reset-sim').addEventListener('click', resetSim);

            toggleBtn.addEventListener('click', () => {
                autoMode = !autoMode;
                toggleBtn.textContent = autoMode ? 'Mode: Autonomous' : 'Mode: Manual';
                hintEl.textContent = autoMode
                    ? 'Tap or use ← → to perturb'
                    : 'Tap or use ← → to push the cart';
                if (autoMode) {
                    controllerState = 'swingup';
                    pidIntegral = 0;
                    pidLastError = 0;
                }
                statusEl.textContent = autoMode ? '[ Swing-Up ]' : '';
            });

            function normAngle(a) {
                a = a % (2 * Math.PI);
                if (a > Math.PI) a -= 2 * Math.PI;
                if (a < -Math.PI) a += 2 * Math.PI;
                return a;
            }

            function swingUpForce() {
                const angle = normAngle(pole.angle);
                const angVel = pole.angularVelocity;
                const dir = Math.sign(angVel * Math.cos(angle));
                return dir * 0.003;
            }

            function pidForce(dt) {
                const angle = normAngle(pole.angle);
                const angVel = pole.angularVelocity;
                const cartPos = cart.position.x;
                const cartVel = cart.velocity.x;

                const Kp_angle = 0.008;
                const Kd_angle = 0.008;
                const Kp_cart = 0.006;
                const Kd_cart = 0.001;

                const angleErr = -angle;

                pidIntegral += angleErr * dt;
                pidIntegral = Math.max(-2, Math.min(2, pidIntegral));
                const Ki_angle = 0.0003;

                const cartErr = (W / 2 - cartPos) / W;

                let f = Kp_angle * angleErr
                      + Ki_angle * pidIntegral
                      + Kd_angle * (-angVel)
                      + Kp_cart * cartErr
                      + Kd_cart * (-cartVel / 10);

                return -Math.max(-0.008, Math.min(0.008, f));
            }

            const SWITCH_TO_BALANCE = 2.0;
            const SWITCH_TO_SWING   = 2.2;

            const manualForce = 0.002;
            const perturbForce = 0.0013;
            const margin = cartW / 2 + 2;

            Events.on(engine, 'beforeUpdate', () => {
                const dt = (engine.timing.lastDelta || 16.67) / 1000;

                if (autoMode) {
                    const angle = normAngle(pole.angle);

                    if (controllerState === 'swingup' && Math.abs(angle) < SWITCH_TO_BALANCE) {
                        controllerState = 'balance';
                        pidIntegral = 0;
                        pidLastError = 0;
                    } else if (controllerState === 'balance' && Math.abs(angle) > SWITCH_TO_SWING) {
                        controllerState = 'swingup';
                    }

                    statusEl.textContent = controllerState === 'swingup'
                        ? '[ Swing-Up ]'
                        : '[ PID Balance ]';

                    const fx = controllerState === 'swingup'
                        ? swingUpForce()
                        : pidForce(dt);

                    Body.applyForce(cart, cart.position, { x: fx, y: 0 });

                    if (keys['ArrowLeft']  || touchDir < 0) Body.applyForce(cart, cart.position, { x: -perturbForce, y: 0 });
                    if (keys['ArrowRight'] || touchDir > 0) Body.applyForce(cart, cart.position, { x:  perturbForce, y: 0 });
                } else {
                    if (keys['ArrowLeft']  || touchDir < 0) Body.applyForce(cart, cart.position, { x: -manualForce, y: 0 });
                    if (keys['ArrowRight'] || touchDir > 0) Body.applyForce(cart, cart.position, { x:  manualForce, y: 0 });
                }

                if (cart.position.x < margin) {
                    Body.setPosition(cart, { x: margin, y: cart.position.y });
                    Body.setVelocity(cart, { x: 0, y: cart.velocity.y });
                } else if (cart.position.x > W - margin) {
                    Body.setPosition(cart, { x: W - margin, y: cart.position.y });
                    Body.setVelocity(cart, { x: 0, y: cart.velocity.y });
                }
            });
        });
    </script>
</body>
</html>
